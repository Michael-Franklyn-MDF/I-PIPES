<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I-PIPES — Analyst Evaluation</title>
  <link rel="stylesheet" href="../assets/global.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">I-PIPES <span>Policy Evaluation</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"   class="nav-item"><span class="nav-icon">▪</span> Dashboard</a>
      <a href="policies.html"    class="nav-item"><span class="nav-icon">▪</span> Policies</a>
      <a href="evaluation.html"  class="nav-item active"><span class="nav-icon">▪</span> Evaluation</a>
      <a href="results.html"     class="nav-item"><span class="nav-icon">▪</span> Results</a>
      <a href="history.html"     class="nav-item"><span class="nav-icon">▪</span> History</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-name">Policy Analyst</div>
      <div class="sidebar-user-role">Analyst</div>
      <a href="../login/index.html" class="logout-link">Log out</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Run Evaluation</div>
        <div class="page-subtitle">Configure and launch a new evaluation for an assigned policy.</div>
      </div>
    </div>

    <div class="card">
      <form>
        <div class="form-grid">
          <div class="form-group">
            <label for="policy">Policy</label>
            <select id="policy" name="policy">
              <option value="">Select a policy</option>
              <option>National ICT Policy 2012</option>
              <option>Broadband Expansion Strategy</option>
              <option>Digital Inclusion Roadmap</option>
              <option>Cybersecurity Framework</option>
            </select>
          </div>

          <div class="form-group">
            <label for="period">Evaluation period</label>
            <select id="period" name="period">
              <option value="">Select period</option>
              <option>2024 (Annual)</option>
              <option>2023 (Annual)</option>
              <option>Q1 2025</option>
              <option>Q4 2024</option>
            </select>
          </div>

          <div class="form-group">
            <label for="dataset">Data source</label>
            <select id="dataset" name="dataset">
              <option value="">Select dataset</option>
              <option>World Bank Open Data</option>
              <option>ITU ICT Indicators</option>
              <option>National Bureau of Statistics</option>
              <option>Custom uploaded dataset</option>
            </select>
          </div>

          <div class="form-group">
            <label for="run-type">Run type</label>
            <select id="run-type" name="run_type">
              <option value="">Select run type</option>
              <option>Full evaluation</option>
              <option>Quick check</option>
              <option>Sensitivity analysis</option>
            </select>
          </div>

          <div class="form-group full">
            <label for="notes">Evaluation notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Capture assumptions, caveats, and questions for reviewers."></textarea>
          </div>
        </div>

        <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 12px;">
          <button type="reset" class="btn btn-secondary">Clear form</button>
          <button type="submit" class="btn btn-primary">Run evaluation</button>
        </div>
      </form>
    </div>
  </main>
</div>
</body>
</html>
